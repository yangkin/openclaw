name: Build Seed Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag suffix'
        required: true
        default: 'seed-latest'
      push:
        description: 'Push to registry'
        required: true
        default: true
        type: boolean

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        if: github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: crpi-p7zet5k9t1r8eu0j.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: crpi-p7zet5k9t1r8eu0j.cn-shenzhen.personal.cr.aliyuncs.com/yangkin/openclaw:${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=seed-amd64
          cache-to: type=gha,mode=max,scope=seed-amd64
